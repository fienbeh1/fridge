<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrigoNinja - Inventario del Hogar</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #252a38;
      --border: #2d3348;
      --text: #e4e7f1;
      --text-muted: #8890a8;
      --refri: #22d3ee;
      --refri-glow: rgba(34, 211, 238, 0.15);
      --alacena: #a78bfa;
      --alacena-glow: rgba(167, 139, 250, 0.15);
      --despensa: #fbbf24;
      --despensa-glow: rgba(251, 191, 36, 0.15);
      --cero: #f87171;
      --cero-glow: rgba(248, 113, 113, 0.15);
      --calorias: #4ade80;
      --calorias-glow: rgba(74, 222, 128, 0.15);
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Plus Jakarta Sans", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 120px; }
    header { background: linear-gradient(135deg, var(--surface) 0%, #12141c 100%); padding: 2rem 1.5rem; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    header .logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
    header h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--refri), var(--calorias)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem; }
    .nav { display: flex; gap: 0.5rem; padding: 1rem; overflow-x: auto; scrollbar-width: none; position: sticky; top: 110px; background: var(--bg); z-index: 90; }
    .nav::-webkit-scrollbar { display: none; }
    .nav-btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.7rem 1.2rem; border: 1px solid var(--border); border-radius: 50px; background: var(--surface); color: var(--text-muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.25s ease; }
    .nav-btn:hover { background: var(--surface-hover); color: var(--text); }
    .nav-btn.active { color: var(--text); border-color: transparent; }
    .nav-btn.active.refri { background: var(--refri-glow); color: var(--refri); }
    .nav-btn.active.alacena { background: var(--alacena-glow); color: var(--alacena); }
    .nav-btn.active.despensa { background: var(--despensa-glow); color: var(--despensa); }
    .nav-btn.active.cero { background: var(--cero-glow); color: var(--cero); }
    .nav-btn.active.calorias { background: var(--calorias-glow); color: var(--calorias); }
    .badge { background: var(--cero); color: white; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 20px; font-weight: 700; }
    main { padding: 1rem; max-width: 900px; margin: 0 auto; }
    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .card { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; border: 1px solid var(--border); }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .item { background: var(--surface-hover); border-radius: 12px; padding: 1rem; display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; transition: all 0.2s; }
    .item:hover { transform: translateX(4px); }
    .item.zero { border: 1px dashed var(--cero); background: var(--cero-glow); }
    .item-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .item-icon.refri { background: var(--refri-glow); }
    .item-icon.alacena { background: var(--alacena-glow); }
    .item-icon.despensa { background: var(--despensa-glow); }
    .item-info { flex: 1; min-width: 0; }
    .item-info h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-info span { font-size: 0.75rem; color: var(--text-muted); }
    .item-qty { font-size: 1.5rem; font-weight: 700; min-width: 50px; text-align: center; }
    .item-qty.zero { color: var(--cero); }
    .item-controls { display: flex; gap: 0.4rem; }
    .ctrl-btn { width: 40px; height: 40px; border: none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-weight: 600; }
    .ctrl-btn:hover { transform: scale(1.1); }
    .ctrl-minus { background: var(--cero-glow); color: var(--cero); }
    .ctrl-plus { background: var(--calorias-glow); color: var(--calorias); }
    .ctrl-del { background: rgba(255,255,255,0.05); color: var(--text-muted); }
    .ctrl-buy { background: var(--calorias); color: #0f1117; }
    .add-section { background: linear-gradient(135deg, var(--surface) 0%, var(--surface-hover) 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-top: 1rem; }
    .add-section h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-input { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; color: var(--text); font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s; }
    .form-input:focus { outline: none; border-color: var(--refri); }
    .form-input::placeholder { color: var(--text-muted); }
    .submit-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--refri), #06b6d4); border: none; border-radius: 12px; color: #0f1117; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34, 211, 238, 0.3); }
    .kcal-hero { background: linear-gradient(135deg, var(--surface) 0%, var(--surface-hover) 100%); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; border: 1px solid var(--border); }
    .kcal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .kcal-person { background: var(--bg); border-radius: 12px; padding: 1.25rem; text-align: center; }
    .kcal-person h4 { font-size: 0.9rem; margin-bottom: 0.5rem; }
    .kcal-person .number { font-size: 2rem; font-weight: 700; }
    .kcal-person .consumed { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; }
    .kcal-person.orson h4 { color: var(--refri); }
    .kcal-person.orson .number { color: var(--refri); }
    .kcal-person.maritza h4 { color: var(--alacena); }
    .kcal-person.maritza .number { color: var(--alacena); }
    .kcal-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 0.75rem; overflow: hidden; }
    .kcal-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .kcal-bar-fill.orson { background: linear-gradient(90deg, var(--refri), #06b6d4); }
    .kcal-bar-fill.maritza { background: linear-gradient(90deg, var(--alacena), #c084fc); }
    .consumo-form { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 0.5rem; margin-bottom: 0.75rem; }
    @media (max-width: 600px) { .kcal-grid { grid-template-columns: 1fr; } .consumo-form { grid-template-columns: 1fr; } }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
  </style>
</head>
<body>
  <header>
    <div class="logo">&#129398;</div>
    <h1>FrigoNinja</h1>
    <p>Orson y Maritza</p>
  </header>
  <nav class="nav">
    <button class="nav-btn refri active" onclick="showSection('refri')">Refrigerador</button>
    <button class="nav-btn alacena" onclick="showSection('alacena')">Alacena</button>
    <button class="nav-btn despensa" onclick="showSection('despensa')">Despensa</button>
    <button class="nav-btn cero" onclick="showSection('cero')">Por Comprar <span class="badge" id="badge-cero">0</span></button>
    <button class="nav-btn calorias" onclick="showSection('calorias')">Calorias</button>
  </nav>
  <main>
    <section id="sec-refri" class="section active">
      <div id="lista-refri"></div>
      <div class="add-section">
        <h3>+ Agregar al Refrigerador</h3>
        <div class="form-grid">
          <input type="text" class="form-input" id="add-nombre" placeholder="Nombre del articulo">
          <input type="number" class="form-input" id="add-cantidad" placeholder="Cantidad" value="1" min="0" step="0.5">
          <input type="text" class="form-input" id="add-ud" placeholder="Unidad" value="pzas">
        </div>
        <button class="submit-btn" onclick="agregar('refri')">Agregar</button>
      </div>
    </section>
    <section id="sec-alacena" class="section">
      <div id="lista-alacena"></div>
      <div class="add-section">
        <h3>+ Agregar a Alacena</h3>
        <div class="form-grid">
          <input type="text" class="form-input" id="add-nombre-ala" placeholder="Nombre del articulo">
          <input type="number" class="form-input" id="add-cantidad-ala" placeholder="Cantidad" value="1" min="0">
          <input type="text" class="form-input" id="add-ud-ala" placeholder="Unidad" value="pzas">
        </div>
        <button class="submit-btn" onclick="agregar('alacena')">Agregar</button>
      </div>
    </section>
    <section id="sec-despensa" class="section">
      <div id="lista-despensa"></div>
      <div class="add-section">
        <h3>+ Agregar a Despensa</h3>
        <div class="form-grid">
          <input type="text" class="form-input" id="add-nombre-desp" placeholder="Nombre del articulo">
          <input type="number" class="form-input" id="add-cantidad-desp" placeholder="Cantidad" value="1" min="0">
          <input type="text" class="form-input" id="add-ud-desp" placeholder="Unidad" value="pzas">
        </div>
        <button class="submit-btn" onclick="agregar('despensa')">Agregar</button>
      </div>
    </section>
    <section id="sec-cero" class="section">
      <div id="lista-cero"></div>
    </section>
    <section id="sec-calorias" class="section">
      <div class="kcal-hero">
        <div class="kcal-grid">
          <div class="kcal-person orson">
            <h4>Orson</h4>
            <div class="number" id="get-orson">--</div>
            <div class="consumed">Consumidas: <span id="kcal-orson">0</span> kcal</div>
            <div class="kcal-bar"><div class="kcal-bar-fill orson" id="barra-orson" style="width:0%"></div></div>
          </div>
          <div class="kcal-person maritza">
            <h4>Maritza</h4>
            <div class="number" id="get-maritza">--</div>
            <div class="consumed">Consumidas: <span id="kcal-maritza">0</span> kcal</div>
            <div class="kcal-bar"><div class="kcal-bar-fill maritza" id="barra-maritza" style="width:0%"></div></div>
          </div>
        </div>
      </div>
      <div class="add-section">
        <h3>+ Registrar Consumo</h3>
        <div class="consumo-form">
          <input type="text" class="form-input" id="cons-alimento" placeholder="Alimento">
          <input type="number" class="form-input" id="cons-kcal" placeholder="Kcal" value="100">
          <select class="form-input" id="cons-persona">
            <option value="orson">Orson</option>
            <option value="maritza">Maritza</option>
          </select>
        </div>
        <button class="submit-btn" onclick="registrarConsumo()">Registrar</button>
      </div>
    </section>
  </main>
  <script>
    let getOrson = 1920, getMaritza = 1851;
    const ICONS = {refri: "&#127839;", alacena: "&#128704;", despensa: "&#129383;"};
    async function loadAll() { await Promise.all([loadItems("refri"), loadItems("alacena"), loadItems("despensa"), loadCero(), loadKcal()]); }
    async function loadItems(tipo) {
      try {
        const res = await fetch("/api/items?categoria=" + tipo);
        const items = await res.json();
        renderItems(tipo, items);
      } catch(e) { console.error(e); }
    }
    async function loadCero() {
      try {
        const res = await fetch("/api/items/en-cero");
        const items = await res.json();
        document.getElementById("badge-cero").textContent = items.length;
        renderItemsCero(items);
      } catch(e) { console.error(e); }
    }
    function renderItems(tipo, items) {
      const el = document.getElementById("lista-" + tipo);
      if (!items.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">&#128230;</div><p>No hay articulos</p></div>'; return; }
      el.innerHTML = items.map(i => {
        const zero = i.cantidad <= 0;
        return '<div class="item' + (zero ? ' zero' : '') + '">' +
          '<div class="item-icon ' + tipo + '">' + ICONS[tipo] + '</div>' +
          '<div class="item-info"><h4>' + i.nombre + '</h4><span>' + i.unidad + '</span></div>' +
          '<div class="item-qty' + (zero ? ' zero' : '') + '">' + i.cantidad + '</div>' +
          '<div class="item-controls">' +
            '<button class="ctrl-btn ctrl-minus" onclick="menos(\'' + i.id + '\', \'' + tipo + '\')">-</button>' +
            '<button class="ctrl-btn ctrl-plus" onclick="mas(\'' + i.id + '\', \'' + tipo + '\')">+</button>' +
            '<button class="ctrl-btn ctrl-del" onclick="del(\'' + i.id + '\', \'' + tipo + '\')">&#128465;</button>' +
          '</div></div>';
      }).join("");
    }
    function renderItemsCero(items) {
      const el = document.getElementById("lista-cero");
      if (!items.length) { el.innerHTML = '<div class="card"><div class="empty"><div class="empty-icon">&#10024;</div><p>Inventario completo!</p></div></div>'; return; }
      const byCat = {refri: [], alacena: [], despensa: []};
      items.forEach(i => { const c = i.categoria === "alacena" ? "alacena" : (i.categoria === "despensa" ? "despensa" : "refri"); byCat[c].push(i); });
      el.innerHTML = Object.entries(byCat).filter(([_, v]) => v.length).map(([cat, its]) => {
        const color = cat === "alacena" ? "var(--alacena)" : (cat === "despensa" ? "var(--despensa)" : "var(--refri)");
        return '<div class="card"><div class="card-title" style="color:' + color + '">' + ICONS[cat] + ' ' + cat.charAt(0).toUpperCase() + cat.slice(1) + '</div>' +
          its.map(i => '<div class="item zero">' +
            '<div class="item-icon ' + cat + '">' + ICONS[cat] + '</div>' +
            '<div class="item-info"><h4>' + i.nombre + '</h4><span>' + i.unidad + '</span></div>' +
            '<div class="item-qty zero">0</div>' +
            '<div class="item-controls"><button class="ctrl-btn ctrl-buy" onclick="comprar(\'' + i.id + '\')">&#10003;</button></div>' +
          '</div>').join("") + '</div>';
      }).join("");
    }
    async function mas(id, tipo) { await fetch("/api/items/" + id + "/+1", {method: "POST"}); loadAll(); }
    async function menos(id, tipo) { await fetch("/api/items/" + id + "/-1", {method: "POST"}); loadAll(); }
    async function comprar(id) { await fetch("/api/items/" + id + "/+1", {method: "POST"}); loadAll(); }
    async function del(id, tipo) { if (!confirm("Eliminar?")) return; await fetch("/api/items/" + id, {method: "DELETE"}); loadAll(); }
    async function agregar(tipo) {
      const suffix = tipo !== "refri" ? "-" + tipo : "";
      const nombre = document.getElementById("add-nombre" + suffix).value.trim();
      const cantidad = parseFloat(document.getElementById("add-cantidad" + suffix).value) || 1;
      const unidad = document.getElementById("add-ud" + suffix).value.trim() || "pzas";
      if (!nombre) return alert("Escribe el nombre");
      await fetch("/api/items", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({nombre, cantidad, unidad, categoria: tipo})});
      document.getElementById("add-nombre" + suffix).value = "";
      loadAll();
    }
    async function loadKcal() {
      try {
        const res = await fetch("/api/kcal-info");
        const data = await res.json();
        getOrson = Math.round(data.orson.get); getMaritza = Math.round(data.maritza.get);
        document.getElementById("get-orson").textContent = getOrson;
        document.getElementById("get-maritza").textContent = getMaritza;
        const cres = await fetch("/api/consumo/hoy");
        const cdata = await cres.json();
        document.getElementById("kcal-orson").textContent = Math.round(cdata.orson.kcal);
        document.getElementById("kcal-maritza").textContent = Math.round(cdata.maritza.kcal);
        document.getElementById("barra-orson").style.width = Math.min(100, (cdata.orson.kcal / getOrson) * 100) + "%";
        document.getElementById("barra-maritza").style.width = Math.min(100, (cdata.maritza.kcal / getMaritza) * 100) + "%";
      } catch(e) { console.error(e); }
    }
    async function registrarConsumo() {
      const alimento = document.getElementById("cons-alimento").value.trim();
      const kcal = parseFloat(document.getElementById("cons-kcal").value) || 0;
      const persona = document.getElementById("cons-persona").value;
      if (!alimento) return alert("Escribe el alimento");
      await fetch("/api/consumo", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({alimento, kcal, persona})});
      document.getElementById("cons-alimento").value = "";
      loadKcal();
    }
    function showSection(tipo) {
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("sec-" + tipo).classList.add("active");
      document.querySelector(".nav-btn." + tipo).classList.add("active");
    }
    loadAll();
  </script>
</body>
</html>
